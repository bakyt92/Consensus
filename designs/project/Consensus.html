<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Consensus</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Bold Civic palette */
    --navy:       #11243a;
    --navy-2:     #1a3050;
    --navy-3:     #364a64;
    --navy-soft:  #5b6f8a;
    --cream:      #f3ecd9;
    --cream-2:    #ebe2c8;
    --paper:      #faf6ea;
    --paper-2:    #f7f1de;
    --rust:       #c54d2c;
    --rust-deep:  #a23e22;
    --rust-soft:  rgba(197, 77, 44, 0.12);
    --ink:        #11243a;
    --ink-2:      #2a3a52;
    --muted:      #6b6657;
    --muted-2:    #8a8474;
    --line:       #ddd2b3;
    --line-2:     #c8bd99;
    --line-soft:  #e8dfc4;
    --ok:         #2d6b4f;
    --ok-soft:    rgba(45, 107, 79, 0.12);
    --warn:       #b4781e;
    --shadow-sm:  0 1px 0 rgba(17, 36, 58, 0.05);
    --shadow-md:  0 6px 24px rgba(17, 36, 58, 0.08);
    --shadow-lg:  0 14px 40px rgba(17, 36, 58, 0.12);

    --r-xs: 2px;
    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 10px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: "Archivo", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01" on, "cv11" on;
  }

  /* ---------- typography primitives ---------- */
  .display {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    letter-spacing: -0.045em;
    line-height: 0.95;
    text-transform: uppercase;
  }
  .h1 { font-size: 48px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; text-transform: uppercase; }
  .h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; }
  .h3 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; }
  .body { font-size: 15px; line-height: 1.5; color: var(--ink-2); }
  .lede { font-size: 17px; line-height: 1.45; color: var(--ink-2); }

  /* mono caps label — used everywhere for section names, counts */
  .label {
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .label.on-navy { color: rgba(243, 236, 217, 0.6); }
  .label.lg { font-size: 12px; letter-spacing: 0.18em; }

  /* serif used only for the live summary doc — gives it "minutes" feel */
  .serif { font-family: "Newsreader", Georgia, serif; }

  /* ---------- buttons ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    padding: 12px 22px;
    border: 1.5px solid transparent;
    border-radius: var(--r-sm);
    font-family: "Archivo", sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.14s ease;
    user-select: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--rust); color: var(--cream); border-color: var(--rust);
  }
  .btn-primary:hover { background: var(--rust-deep); border-color: var(--rust-deep); }
  .btn-primary:active { transform: translateY(1px); }

  .btn-ink {
    background: var(--navy); color: var(--cream); border-color: var(--navy);
  }
  .btn-ink:hover { background: var(--navy-2); border-color: var(--navy-2); }

  .btn-ghost {
    background: transparent; color: var(--navy); border-color: var(--navy);
  }
  .btn-ghost:hover { background: var(--navy); color: var(--cream); }

  .btn-soft {
    background: transparent; color: var(--navy); border-color: var(--line-2);
  }
  .btn-soft:hover { background: var(--paper); border-color: var(--navy); }

  .btn-sm { padding: 8px 14px; font-size: 11px; letter-spacing: 0.1em; }
  .btn-xs { padding: 6px 10px; font-size: 10px; letter-spacing: 0.1em; }
  .btn-lg { padding: 16px 28px; font-size: 14px; }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---------- inputs ---------- */
  .field-label {
    display: block;
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .input, .textarea {
    width: 100%;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: var(--r-sm);
    padding: 14px 16px;
    font-family: "Archivo", sans-serif;
    font-size: 16px;
    color: var(--ink);
    transition: border-color 0.14s, background 0.14s;
    font-weight: 500;
  }
  .input:focus, .textarea:focus {
    outline: none;
    border-color: var(--navy);
    background: #fff;
  }
  .textarea { resize: vertical; min-height: 96px; line-height: 1.45; font-weight: 400; }
  .input::placeholder, .textarea::placeholder { color: var(--muted-2); font-weight: 400; }

  /* ---------- pill / tag ---------- */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink-2);
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .pill.ok { background: var(--ok-soft); border-color: rgba(45,107,79,0.3); color: var(--ok); }
  .pill.ok .dot { background: var(--ok); }
  .pill.live { background: var(--rust-soft); border-color: rgba(197,77,44,0.3); color: var(--rust); }
  .pill.live .dot { background: var(--rust); animation: pulse 1.6s ease-in-out infinite; }
  .pill.locked { background: var(--navy); color: var(--cream); border-color: var(--navy); }
  .pill.locked .dot { background: var(--cream); }
  .pill.lg { padding: 6px 14px; font-size: 11px; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ---------- logo / brand mark ---------- */
  .brand {
    display: inline-flex; align-items: center; gap: 12px;
    color: var(--navy);
  }
  .brand-mark {
    width: 36px; height: 36px;
    background: var(--navy);
    color: var(--cream);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: "Archivo", sans-serif;
    font-weight: 800; font-size: 18px;
    letter-spacing: -0.04em;
    position: relative;
    flex: 0 0 auto;
  }
  .brand-mark::before {
    content: ""; position: absolute; inset: 3px;
    border: 1px solid rgba(243, 236, 217, 0.3);
    border-radius: 50%;
  }
  .brand-mark::after {
    content: ""; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; background: var(--rust); border-radius: 50%;
  }
  .brand-mark.lg { width: 72px; height: 72px; font-size: 36px; }
  .brand-mark.lg::after { width: 7px; height: 7px; bottom: 8px; }
  .brand-mark.xl { width: 104px; height: 104px; font-size: 52px; }
  .brand-mark.xl::after { width: 10px; height: 10px; bottom: 12px; }
  .brand-mark.xl::before { inset: 6px; border-width: 1.5px; }

  .wordmark {
    font-family: "Archivo", sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.05em;
    text-transform: uppercase;
    color: var(--navy);
  }

  /* ---------- avatar ---------- */
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--cream);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: "Archivo", sans-serif;
    font-weight: 700; font-size: 13px;
    letter-spacing: -0.02em;
    flex: 0 0 auto;
    border: 2px solid var(--cream);
  }
  .avatar.sm { width: 24px; height: 24px; font-size: 10px; border-width: 1.5px; }
  .avatar.lg { width: 44px; height: 44px; font-size: 16px; }
  .avatar.you { background: var(--rust); }

  .avatar-row { display: flex; }
  .avatar-row .avatar + .avatar { margin-left: -8px; }
  .avatar-row.sm .avatar + .avatar { margin-left: -6px; }

  /* ---------- card ---------- */
  .card {
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: var(--r-sm);
    padding: 20px;
  }
  .card.tight { padding: 14px; }
  .card.flat { background: transparent; }
  .card.ink { background: var(--navy); color: var(--cream); border-color: var(--navy); }

  /* ---------- divider ---------- */
  .rule { height: 1px; background: var(--line); border: 0; margin: 0; }
  .rule.heavy { height: 2px; background: var(--navy); }

  /* ---------- app shell ---------- */
  #app-root { min-height: 100vh; display: flex; flex-direction: column; }

  /* ---------- entry-screen shared chrome ---------- */
  .entry-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    background: var(--cream);
  }
  .entry-side {
    background: var(--navy);
    color: var(--cream);
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .entry-side::before {
    content: ""; position: absolute; right: -80px; bottom: -80px;
    width: 320px; height: 320px;
    border: 1.5px solid rgba(243, 236, 217, 0.08);
    border-radius: 50%;
  }
  .entry-side::after {
    content: ""; position: absolute; right: 40px; bottom: 40px;
    width: 120px; height: 120px;
    border: 1.5px solid rgba(243, 236, 217, 0.08);
    border-radius: 50%;
  }
  .entry-side .display { color: var(--cream); }
  .entry-side .wordmark { color: var(--cream); }
  .entry-side .brand-mark { background: var(--cream); color: var(--navy); }
  .entry-side .brand-mark::before { border-color: rgba(17, 36, 58, 0.18); }
  .entry-main {
    padding: 64px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: var(--cream);
  }

  /* ---------- mini divider with caps label ---------- */
  .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .section-head .rule { flex: 1; }

  /* ---------- helpers ---------- */
  .stack { display: flex; flex-direction: column; }
  .stack > * + * { margin-top: var(--gap, 16px); }
  .row { display: flex; align-items: center; }
  .row > * + * { margin-left: var(--gap, 12px); }
  .grow { flex: 1; }
  .center { display: flex; align-items: center; justify-content: center; }
  .mono { font-family: "IBM Plex Mono", monospace; }
  .num { font-family: "Archivo", sans-serif; font-weight: 800; letter-spacing: -0.03em; }

  a { color: var(--rust); text-decoration: none; font-weight: 600; }
  a:hover { text-decoration: underline; text-underline-offset: 3px; }

  /* ---------- popover / tooltip ---------- */
  .field-with-help { position: relative; }
  .help-trigger {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--line);
    color: var(--ink);
    font-family: "Archivo", sans-serif;
    font-size: 10px; font-weight: 700;
    cursor: help;
    margin-left: 8px;
    transition: background 0.14s;
    vertical-align: middle;
  }
  .help-trigger:hover { background: var(--navy); color: var(--cream); }
  .popover {
    position: absolute;
    top: calc(100% + 8px); left: 0;
    background: var(--navy);
    color: var(--cream);
    padding: 16px 18px;
    border-radius: var(--r-sm);
    font-size: 13px;
    line-height: 1.5;
    max-width: 360px;
    box-shadow: var(--shadow-lg);
    z-index: 100;
    font-weight: 400;
  }
  .popover::before {
    content: "";
    position: absolute;
    top: -6px; left: 24px;
    width: 12px; height: 12px;
    background: var(--navy);
    transform: rotate(45deg);
  }
  .popover .label.on-navy { display: block; margin-bottom: 8px; }
  .popover ul { margin: 8px 0 0; padding-left: 16px; }
  .popover li + li { margin-top: 4px; }

  /* ---------- room layout ---------- */
  .room {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    overflow: hidden;
  }
  .room-header {
    background: var(--cream);
    border-bottom: 1.5px solid var(--line);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .room-body {
    display: grid;
    grid-template-columns: 380px 1fr 280px;
    overflow: hidden;
    background: var(--cream);
  }
  .room-chat {
    background: var(--paper);
    border-right: 1.5px solid var(--line);
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }
  .room-center {
    overflow: auto;
    background: var(--cream);
    display: flex;
    flex-direction: column;
  }
  .room-right {
    background: var(--paper-2);
    border-left: 1.5px solid var(--line);
    padding: 20px;
    overflow: auto;
  }

  /* chat */
  .chat-head { padding: 16px 20px; border-bottom: 1px solid var(--line-soft); display: flex; align-items: center; justify-content: space-between; }
  .chat-feed { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .chat-input-bar { padding: 14px 16px; border-top: 1px solid var(--line-soft); background: var(--paper-2); }

  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg .avatar { margin-top: 2px; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .msg-name { font-weight: 700; font-size: 13px; letter-spacing: -0.01em; }
  .msg-time { font-family: "IBM Plex Mono", monospace; font-size: 10px; color: var(--muted-2); }
  .msg-text { font-size: 14px; line-height: 1.5; color: var(--ink-2); }
  .msg.mediator .msg-body {
    background: var(--navy); color: var(--cream); border-radius: var(--r-sm);
    padding: 12px 14px;
  }
  .msg.mediator .msg-name { color: var(--cream); }
  .msg.mediator .msg-time { color: rgba(243,236,217,0.55); }
  .msg.mediator .msg-text { color: rgba(243,236,217,0.95); }
  .msg.mediator .msg-text strong { color: #f9d6a5; font-weight: 600; }
  .msg.mediator .avatar { background: var(--navy); color: var(--cream); border-color: var(--cream); position: relative; }
  .msg.mediator .avatar::after {
    content: ""; position: absolute; inset: 4px;
    border: 1px solid rgba(243,236,217,0.4); border-radius: 50%;
  }
  .msg.filtered .msg-body {
    opacity: 0.5;
    background: repeating-linear-gradient(135deg, var(--paper-2) 0 8px, transparent 8px 14px);
    border: 1px dashed var(--line);
    border-radius: var(--r-sm);
    padding: 8px 12px;
  }
  .msg.filtered .msg-text { font-style: italic; color: var(--muted); font-size: 12px; }

  /* reply suggestions */
  .suggest-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .suggest-row .label { margin-bottom: 2px; }
  .suggest {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: var(--r-sm);
    color: var(--ink);
    font-size: 13px; line-height: 1.35;
    text-align: left;
    cursor: pointer;
    transition: all 0.14s;
    font-family: inherit;
  }
  .suggest:hover {
    border-color: var(--navy);
    background: var(--cream);
  }
  .suggest .key {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; font-weight: 600;
    color: var(--muted);
    padding: 2px 6px;
    background: var(--cream-2);
    border-radius: 3px;
    flex: 0 0 auto;
  }

  .input-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: var(--r-sm);
    padding: 6px 6px 6px 14px;
  }
  .input-row:focus-within { border-color: var(--navy); background: #fff; }
  .input-row input {
    flex: 1; border: 0; background: transparent; outline: none;
    font-family: inherit; font-size: 14px; color: var(--ink);
  }
  .icon-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink);
    transition: all 0.14s;
    flex: 0 0 auto;
  }
  .icon-btn:hover { background: var(--cream-2); }
  .icon-btn.active { background: var(--rust); color: var(--cream); }
  .icon-btn.send { background: var(--navy); color: var(--cream); }
  .icon-btn.send:hover { background: var(--navy-2); }

  /* mic listening state */
  .mic-pulse {
    position: absolute; inset: -4px;
    border-radius: var(--r-sm);
    border: 2px solid var(--rust);
    animation: micpulse 1.2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes micpulse {
    0% { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1.2); opacity: 0; }
  }
  .listening-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--rust-soft);
    border: 1px solid rgba(197,77,44,0.2);
    border-radius: var(--r-sm);
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--rust-deep);
  }
  .waveform { display: inline-flex; align-items: center; gap: 2px; height: 16px; }
  .waveform span {
    width: 2px;
    background: var(--rust);
    border-radius: 1px;
    animation: wave 0.9s ease-in-out infinite;
  }
  .waveform span:nth-child(1) { height: 30%; animation-delay: 0s; }
  .waveform span:nth-child(2) { height: 60%; animation-delay: 0.1s; }
  .waveform span:nth-child(3) { height: 90%; animation-delay: 0.2s; }
  .waveform span:nth-child(4) { height: 50%; animation-delay: 0.3s; }
  .waveform span:nth-child(5) { height: 70%; animation-delay: 0.4s; }
  .waveform span:nth-child(6) { height: 40%; animation-delay: 0.5s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1); }
  }

  /* tts speaking indicator */
  .speak-btn {
    width: 22px; height: 22px;
    background: rgba(243,236,217,0.12);
    border: 0; border-radius: 4px;
    cursor: pointer; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    color: rgba(243,236,217,0.7);
    flex: 0 0 auto;
    transition: all 0.14s;
  }
  .speak-btn:hover { background: rgba(243,236,217,0.2); color: var(--cream); }
  .speak-btn.speaking { background: var(--rust); color: var(--cream); }

  /* consensus bar */
  .consensus-card { padding: 18px 20px; }
  .consensus-bar {
    height: 8px; background: var(--cream-2);
    border-radius: 999px; overflow: hidden;
    position: relative;
    border: 1px solid var(--line);
  }
  .consensus-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rust), var(--rust-deep));
    border-radius: 999px;
    transition: width 0.8s cubic-bezier(0.2, 0.7, 0.3, 1);
    position: relative;
  }
  .consensus-fill.met {
    background: linear-gradient(90deg, var(--ok), #1f4d38);
  }
  .threshold-marker {
    position: absolute; top: -3px; bottom: -3px;
    width: 2px; background: var(--navy);
  }
  .threshold-marker::after {
    content: ""; position: absolute; left: 50%; top: -4px;
    transform: translateX(-50%);
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 4px solid var(--navy);
  }

  /* summary doc */
  .summary-doc {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 48px 80px;
    flex: 1;
  }
  .summary-doc .doc-head {
    border-bottom: 2px solid var(--navy);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  .summary-doc .doc-title {
    font-family: "Archivo", sans-serif;
    font-weight: 800; font-size: 36px;
    letter-spacing: -0.04em; line-height: 1.0;
    text-transform: uppercase;
    margin: 8px 0 0;
  }
  .summary-doc .doc-meta {
    display: flex; gap: 24px;
    margin-top: 14px;
  }
  .summary-doc .doc-meta > div { display: flex; flex-direction: column; gap: 2px; }
  .summary-doc section { margin-bottom: 28px; animation: slidein 0.5s ease-out; }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .summary-doc h3.s-head {
    font-family: "Archivo", sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    margin: 0 0 10px;
    display: flex; align-items: baseline; gap: 10px;
  }
  .summary-doc h3.s-head .s-num {
    font-family: "IBM Plex Mono", monospace;
    font-weight: 500; font-size: 12px; letter-spacing: 0.16em;
    color: var(--muted);
  }
  .summary-doc p.s-body {
    font-family: "Newsreader", Georgia, serif;
    font-size: 17px; line-height: 1.55;
    color: var(--ink);
    margin: 0;
  }
  .summary-doc ul.s-list {
    font-family: "Newsreader", Georgia, serif;
    font-size: 16px; line-height: 1.5;
    color: var(--ink);
    padding-left: 18px;
    margin: 0;
  }
  .summary-doc ul.s-list li { margin-bottom: 6px; }
  .summary-doc ul.s-list li strong { font-family: "Archivo", sans-serif; font-weight: 700; font-size: 14px; letter-spacing: -0.01em; text-transform: uppercase; color: var(--rust); }
  .summary-doc .agree-line { font-family: "Newsreader", serif; font-style: italic; font-size: 15px; color: var(--muted); margin-top: 8px; }

  .doc-banner {
    background: var(--navy); color: var(--cream);
    padding: 16px 20px;
    border-radius: var(--r-sm);
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 28px;
  }
  .doc-banner.consensus-met { background: var(--ok); }
  .doc-banner.closed { background: var(--navy); }
  .doc-banner .bigtext { font-family: "Archivo", sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.03em; text-transform: uppercase; line-height: 1; }
  .doc-banner .subtext { font-size: 13px; color: rgba(243,236,217,0.7); margin-top: 4px; }

  /* admin kebab menu */
  .kebab-wrap { position: relative; }
  .kebab-btn {
    width: 36px; height: 36px;
    border: 1.5px solid var(--line);
    background: transparent;
    border-radius: var(--r-sm);
    cursor: pointer;
    color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.14s;
  }
  .kebab-btn:hover { border-color: var(--navy); background: var(--paper); }
  .kebab-menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: var(--r-sm);
    box-shadow: var(--shadow-lg);
    min-width: 260px;
    z-index: 50;
    overflow: hidden;
  }
  .kebab-menu .item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 13px; font-weight: 500;
    color: var(--ink);
    transition: background 0.12s;
    border: 0; background: transparent; width: 100%; text-align: left;
    font-family: inherit;
  }
  .kebab-menu .item:hover { background: var(--paper); }
  .kebab-menu .item.danger { color: var(--rust); }
  .kebab-menu .item.danger:hover { background: var(--rust-soft); }
  .kebab-menu .item .sub { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 400; }
  .kebab-menu .item-divider { height: 1px; background: var(--line-soft); margin: 4px 0; }
  .kebab-menu .head { padding: 10px 16px; background: var(--paper); border-bottom: 1px solid var(--line-soft); }

  /* participant cards in right rail */
  .p-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--r-sm);
    transition: background 0.12s;
  }
  .p-row .p-status {
    margin-left: auto;
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted);
  }
  .p-row .p-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .p-row .p-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .p-row .p-bullet { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
  .p-row .p-bullet.away { background: var(--warn); }
  .p-row .p-bullet.thinking { background: var(--navy-3); animation: pulse 1.5s ease-in-out infinite; }

  /* small util */
  .text-rust { color: var(--rust); }
  .text-muted { color: var(--muted); }
  .text-ok { color: var(--ok); }

  /* tweaks panel font override so it matches the brand a bit */
  .tweaks-panel { font-family: "Archivo", sans-serif !important; }

  /* responsive collapse for very narrow viewports — keep prototype readable */
  @media (max-width: 1100px) {
    .room-body { grid-template-columns: 320px 1fr; }
    .room-right { display: none; }
  }
  @media (max-width: 880px) {
    .entry-shell { grid-template-columns: 1fr; }
    .entry-side { padding: 32px 36px; }
    .entry-side::before, .entry-side::after { display: none; }
    .entry-main { padding: 36px 36px; }
  }

  /* ---------- center-pane tabs (template viz vs minutes) ---------- */
  .center-tabs {
    display: flex;
    padding: 14px 48px 0;
    background: var(--cream);
    border-bottom: 1px solid var(--line);
    gap: 4px;
    position: sticky; top: 0;
    z-index: 5;
  }
  .center-tab {
    background: transparent; border: 0;
    padding: 12px 16px 14px;
    font-family: "Archivo", sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.14s, border-color 0.14s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .center-tab:hover { color: var(--ink); }
  .center-tab.active { color: var(--ink); border-bottom-color: var(--rust); }
  .center-tab .count {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; font-weight: 500;
    background: var(--cream-2);
    color: var(--muted);
    padding: 1px 5px; border-radius: 2px;
    letter-spacing: 0.04em;
  }
  .center-tab.active .count { background: var(--rust); color: var(--cream); }
  .center-body { padding: 32px 48px 80px; max-width: 920px; margin: 0 auto; width: 100%; }

  /* ---------- participant row, made clickable ---------- */
  .p-row.clickable { cursor: pointer; }
  .p-row.clickable:hover { background: var(--cream-2); }

  /* ---------- participant inspector drawer ---------- */
  .inspector-backdrop {
    position: fixed; inset: 0;
    background: rgba(17, 36, 58, 0.36);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.22s ease;
    pointer-events: none;
  }
  .inspector-backdrop.open { opacity: 1; pointer-events: auto; }
  .inspector-drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(440px, 92vw);
    background: var(--cream);
    border-left: 1.5px solid var(--line);
    box-shadow: var(--shadow-lg);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.2, 0.7, 0.3, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .inspector-drawer.open { transform: translateX(0); }
  .inspector-head {
    padding: 24px 28px 20px;
    border-bottom: 1.5px solid var(--line);
    display: flex; flex-direction: column; gap: 14px;
    background: var(--paper);
  }
  .inspector-close {
    width: 32px; height: 32px;
    background: transparent;
    border: 1.5px solid var(--line);
    border-radius: var(--r-sm);
    color: var(--ink);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.14s;
  }
  .inspector-close:hover { border-color: var(--navy); background: var(--cream-2); }
  .inspector-body { overflow-y: auto; padding: 24px 28px 32px; flex: 1; }

  /* histogram */
  .histogram { display: flex; flex-direction: column; gap: 8px; }
  .histogram .hrow { display: grid; grid-template-columns: 110px 1fr 28px; align-items: center; gap: 10px; }
  .histogram .hlabel {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-2);
  }
  .histogram .hbar {
    height: 18px;
    background: var(--cream-2);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .histogram .hfill {
    height: 100%;
    background: var(--navy);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.2, 0.7, 0.3, 1);
  }
  .histogram .hcount {
    font-family: "Archivo", sans-serif;
    font-size: 13px; font-weight: 700; color: var(--ink-2);
    text-align: right;
  }

  /* sentiment dots row */
  .sent-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .sent-cell {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    padding: 12px 14px;
  }
  .sent-cell .sent-dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block; margin-right: 8px;
    vertical-align: middle;
  }

  /* recent message in inspector */
  .insp-msg {
    padding: 12px 14px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    margin-bottom: 8px;
  }
  .insp-msg .insp-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .insp-msg .insp-time {
    font-family: "IBM Plex Mono", monospace;
    font-size: 10px; color: var(--muted);
  }
  .insp-msg .insp-text {
    font-size: 13px; line-height: 1.45; color: var(--ink-2);
  }

  /* tweaked chat msg padding to make room for chip */
  .msg .chip-row { margin-top: 6px; }
</style>
</head>
